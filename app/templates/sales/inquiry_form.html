{% extends 'base.html' %}
{% block content %}
<div class='d-flex gap-2 mt-3 mb-3'><a class='btn btn-outline-dark' href='javascript:history.back()'>Close / Back</a><a class='btn btn-outline-secondary' href='/'>Home</a></div>
<h2 class='fw-bold'>New Customer Inquiry</h2>
<form method='post' class='card shadow-sm'><div class='card-body'><div class='row g-3'>
<div class='col-md-4'><label class='form-label'>Inquiry Date</label><input class='form-control' type='date' name='inquiry_date'></div>
<div class='col-md-4'><label class='form-label'>Customer</label><input class='form-control' list='customerOptions' name='customer_name' placeholder='Select existing customer or type new customer name' required><datalist id='customerOptions'>{% for c in customers %}<option value='{{ c.customer_name }}'>{% endfor %}</datalist><small class='text-muted'>Hal field oo keliya: dooro customer jira ama qor mid cusub.</small></div>
<div class='col-md-4'><label class='form-label'>Phone</label><input class='form-control' name='phone'></div>
<div class='col-md-3'><label class='form-label'>Location</label><input class='form-control' name='location'></div>
<div class='col-md-3'><label class='form-label'>Source</label><select class='form-select' name='source'>{% for s in sources %}<option value='{{ s }}'>{{ s }}</option>{% endfor %}</select></div>
<div class='col-md-3'><label class='form-label'>Project Type</label><select class='form-select' name='project_type'><option value=''>-- select --</option>{% for t in project_types %}<option value='{{ t.type_name }}'>{{ t.type_name }}</option>{% endfor %}</select></div>
<div class='col-md-3'><label class='form-label'>Estimated Capacity</label><input class='form-control' name='estimated_capacity'></div>
<div class='col-md-3'><label class='form-label'>Status</label><select class='form-select' name='status'>{% for s in statuses %}<option value='{{ s }}'>{{ s }}</option>{% endfor %}</select></div>
<div class='col-md-3'><label class='form-label'>Assigned To</label><select class='form-select' name='assigned_to_id'><option value=''>-- select --</option>{% for u in users %}<option value='{{ u.id }}'>{{ u.full_name }}</option>{% endfor %}</select></div>
<div class='col-md-3'><label class='form-label'>Next Follow-up</label><input class='form-control' type='date' name='next_followup_date'></div>
<div class='col-md-12'><label class='form-label'>Requirement Summary</label><textarea class='form-control' name='requirement_summary' rows='3'></textarea></div><div class='col-md-12'><label class='form-label'>Notes</label><textarea class='form-control' name='notes' rows='2'></textarea></div>
</div><div class='mt-3'><button class='btn btn-primary'>Save Inquiry</button></div></div></form>
{% endblock %}
