{% extends "base.html" %}
{% block content %}
<div class="mt-4 mb-3"><h2 class="fw-bold">{{ "Edit Employee" if employee else "Add Employee" }}</h2></div>
<form method="post" class="card shadow-sm"><div class="card-body">
<div class="row g-3">
    <div class="col-md-3"><label class="form-label">Employee ID</label><input class="form-control" value="{{ employee.employee_code if employee else 'Auto Generated' }}" readonly><small class="text-muted">System generated</small></div>
    <div class="col-md-5"><label class="form-label">Full Name *</label><input class="form-control" name="full_name" value="{{ employee.full_name if employee else '' }}" required></div>
    <div class="col-md-4"><label class="form-label">Job Title</label><input class="form-control" name="job_title" value="{{ employee.job_title if employee else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ employee.phone if employee else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Email</label><input class="form-control" name="email" value="{{ employee.email if employee else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Employee Type</label><select class="form-select" name="employee_type">{% for t in types %}<option value="{{ t }}" {% if employee and employee.employee_type==t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Status</label><select class="form-select" name="status">{% for s in statuses %}<option value="{{ s }}" {% if employee and employee.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
    <div class="col-md-4"><label class="form-label">Branch</label><select class="form-select" name="branch_id"><option value="">--</option>{% for b in branches %}<option value="{{ b.id }}" {% if employee and employee.branch_id==b.id %}selected{% endif %}>{{ b.branch_name }}</option>{% endfor %}</select></div>
    <div class="col-md-4"><label class="form-label">Department</label><select class="form-select" name="department_id"><option value="">--</option>{% for d in departments %}<option value="{{ d.id }}" {% if employee and employee.department_id==d.id %}selected{% endif %}>{{ d.department_name }}</option>{% endfor %}</select></div>
    <div class="col-md-4"><label class="form-label">Linked User Account</label><select class="form-select" name="user_id"><option value="">--</option>{% for u in users %}<option value="{{ u.id }}" {% if employee and employee.user_id==u.id %}selected{% endif %}>{{ u.full_name }} - {{ u.role }}</option>{% endfor %}</select></div>
    <div class="col-md-12"><label class="form-label">Remarks</label><textarea class="form-control" name="remarks" rows="3">{{ employee.remarks if employee else '' }}</textarea></div>
</div>
<div class="mt-3"><button class="btn btn-dark">Save</button> <a class="btn btn-outline-secondary" href="{{ url_for('master.employees') }}">Cancel</a></div>
</div></form>
{% endblock %}
