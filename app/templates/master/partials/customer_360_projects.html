<div class="card shadow-sm"><div class="card-body table-responsive">
<table class="table table-hover align-middle"><thead><tr><th>Project</th><th>Type</th><th>Capacity</th><th>Location</th><th>Status</th><th></th></tr></thead><tbody>
{% for p in projects %}<tr><td class="fw-semibold">{{ p.project_name }}</td><td>{{ p.project_type }}</td><td>{{ p.capacity or '' }}</td><td>{{ p.location }}</td><td><span class="badge bg-primary">{{ p.status }}</span></td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('projects.detail', project_id=p.id) }}">Open</a></td></tr>
{% else %}<tr><td colspan="6" class="text-muted">No projects found.</td></tr>{% endfor %}
</tbody></table></div></div>
