{% extends "base.html" %}{% block content %}<div class="mt-4 mb-3"><h2 class="fw-bold">Change Password</h2><p class="text-muted">{{ user.full_name }} — {{ user.email }}</p></div><div class="card shadow-sm"><div class="card-body"><form method="POST"><div class="mb-3"><label class="form-label">New Password</label><input type="password" class="form-control" name="password" required></div><div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" class="form-control" name="confirm_password" required></div><button class="btn btn-primary">Change Password</button><a class="btn btn-light" href="{{ url_for('users.list_users') }}">Cancel</a></form></div></div>{% endblock %}
