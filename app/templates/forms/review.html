{% extends "base.html" %}
{% block content %}
<div class="mt-4 mb-3"><h2 class="fw-bold">Review {{ form_title }}</h2><p class="text-muted">{{ entry.project.project_name }} — Form #{{ entry.id }}</p></div>
<div class="card shadow-sm brand-card"><div class="card-body"><form method="POST"><div class="mb-3"><label class="form-label">Approval Decision</label><select class="form-select" name="approval_status" required><option value="Under Review" {% if entry.approval_status == "Under Review" %}selected{% endif %}>Under Review</option><option value="Approved" {% if entry.approval_status == "Approved" %}selected{% endif %}>Approved</option><option value="Rejected" {% if entry.approval_status == "Rejected" %}selected{% endif %}>Rejected</option><option value="Need Correction" {% if entry.approval_status == "Need Correction" %}selected{% endif %}>Need Correction</option></select></div><div class="mb-3"><label class="form-label">Manager Comments</label><textarea class="form-control" name="manager_comments" rows="5">{{ entry.manager_comments or "" }}</textarea></div><button class="btn btn-primary">Save Review</button><a class="btn btn-light" href="{{ url_for('forms.view_form', form_key=form_key, form_id=entry.id) }}">Cancel</a></form></div></div>
{% endblock %}
