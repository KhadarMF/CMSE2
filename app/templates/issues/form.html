{% extends "base.html" %}
{% block content %}
<div class="mt-4 mb-3"><h2 class="fw-bold">{{ 'Edit Issue' if issue else 'Report New Issue' }}</h2></div>
<form method="post" class="card shadow-sm"><div class="card-body row g-3">
  <div class="col-md-6"><label class="form-label">Project</label><select name="project_id" class="form-select" required>{% for p in projects %}<option value="{{ p.id }}" {% if (issue and issue.project_id==p.id) or (selected_project_id|string==p.id|string) %}selected{% endif %}>{{ p.project_name }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Responsible User</label><select name="responsible_user_id" class="form-select"><option value="">Unassigned</option>{% for u in users %}<option value="{{ u.id }}" {% if issue and issue.responsible_user_id==u.id %}selected{% endif %}>{{ u.full_name }} - {{ u.role }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Issue Title</label><input name="title" class="form-control" value="{{ issue.title if issue else '' }}" required></div>
  <div class="col-md-2"><label class="form-label">Type</label><select name="issue_type" class="form-select">{% for t in issue_types %}<option value="{{ t }}" {% if issue and issue.issue_type==t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div>
  <div class="col-md-2"><label class="form-label">Severity</label><select name="severity" class="form-select">{% for s in severities %}<option value="{{ s }}" {% if issue and issue.severity==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
  <div class="col-md-2"><label class="form-label">Status</label><select name="status" class="form-select">{% for s in statuses %}<option value="{{ s }}" {% if issue and issue.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
  <div class="col-md-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3">{{ issue.description if issue else '' }}</textarea></div>
  <div class="col-md-4"><label class="form-label">Target Resolution Date</label><input type="date" name="target_resolution_date" class="form-control" value="{{ issue.target_resolution_date if issue else '' }}"></div>
  <div class="col-md-12"><label class="form-label">Resolution Notes</label><textarea name="resolution_notes" class="form-control" rows="3">{{ issue.resolution_notes if issue else '' }}</textarea></div>
  <div class="col-md-12 d-flex gap-2"><button class="btn btn-primary">Save Issue</button><a class="btn btn-outline-secondary" href="{{ url_for('issues.list_issues') }}">Cancel</a></div>
</div></form>
{% if issue and current_user.role in ['Admin','Management','Operation Manager'] %}
<form method="post" action="{{ url_for('issues.delete_issue', issue_id=issue.id) }}" onsubmit="return confirm('Delete this issue?')" class="mt-3"><button class="btn btn-outline-danger">Delete Issue</button></form>
{% endif %}
{% endblock %}
