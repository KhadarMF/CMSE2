{% extends "base.html" %}{% block content %}<div class="mt-4 mb-3"><h2 class="fw-bold">Role Permissions Overview</h2></div><div class="row g-3">{% for role, items in permissions.items() %}<div class="col-md-4"><div class="card shadow-sm h-100"><div class="card-header bg-white fw-bold">{{ role }}</div><div class="card-body"><ul>{% for item in items %}<li>{{ item }}</li>{% endfor %}</ul></div></div></div>{% endfor %}</div>{% endblock %}
