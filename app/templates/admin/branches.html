{% extends "base.html" %}{% block content %}<div class="mt-4 mb-3"><h2 class="fw-bold">Branches</h2></div><div class="card shadow-sm mb-4"><div class="card-body"><form method="POST" class="row g-2"><div class="col-md-5"><input class="form-control" name="branch_name" placeholder="Branch name" required></div><div class="col-md-5"><input class="form-control" name="location" placeholder="Location"></div><div class="col-md-2"><button class="btn btn-primary w-100">Add Branch</button></div></form></div></div><div class="card shadow-sm"><div class="card-body"><table class="table table-hover"><thead><tr><th>Branch</th><th>Location</th><th>Status</th><th>Action</th></tr></thead><tbody>{% for branch in branches %}<tr><td>{{ branch.branch_name }}</td><td>{{ branch.location or "" }}</td><td>{{ "Active" if branch.is_active else "Disabled" }}</td><td><a class="btn btn-sm btn-outline-dark" href="{{ url_for('admin.toggle_branch', branch_id=branch.id) }}">Toggle</a></td></tr>{% else %}<tr><td colspan="4" class="text-muted">No branches found.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
