{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mt-3 mb-3">
  <div><h2 class="fw-bold mb-0">Company Profile</h2><small class="text-muted">This information appears on forms, reports and print/PDF pages.</small></div>
  <div><a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin.settings_home') }}">Back</a><a class="btn btn-outline-dark btn-sm" href="{{ url_for('dashboard.dashboard') }}">Home</a></div>
</div>
<form method="post" class="card shadow-sm brand-card">
  <div class="card-header brand-card-header">Company Details</div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Company Name</label><input class="form-control" name="company_name" value="{{ company.company_name or '' }}" required></div>
      <div class="col-md-6"><label class="form-label">Tagline</label><input class="form-control" name="tagline" value="{{ company.tagline or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ company.phone or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" value="{{ company.email or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Website</label><input class="form-control" name="website" value="{{ company.website or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Tax / Registration No.</label><input class="form-control" name="tax_no" value="{{ company.tax_no or '' }}"></div>
      <div class="col-md-12"><label class="form-label">Address</label><input class="form-control" name="address" value="{{ company.address or '' }}"></div>
      <div class="col-md-4"><label class="form-label">Logo Text</label><input class="form-control" name="logo_text" value="{{ company.logo_text or 'CMSE' }}"></div>
      <div class="col-md-4"><label class="form-label">Primary Color</label><input class="form-control" type="color" name="primary_color" value="{{ company.primary_color or '#f97316' }}"></div>
      <div class="col-md-4"><label class="form-label">Secondary Color</label><input class="form-control" type="color" name="secondary_color" value="{{ company.secondary_color or '#16a34a' }}"></div>
    </div>
    <div class="mt-3"><button class="btn btn-cmse">Save Company Profile</button></div>
  </div>
</form>
{% endblock %}
