{% extends "base.html" %}{% block content %}<div class="mt-4 mb-3"><h2 class="fw-bold">Departments</h2></div><div class="card shadow-sm mb-4"><div class="card-body"><form method="POST" class="row g-2"><div class="col-md-4"><input class="form-control" name="department_name" placeholder="Department name" required></div><div class="col-md-6"><input class="form-control" name="description" placeholder="Description"></div><div class="col-md-2"><button class="btn btn-primary w-100">Add Department</button></div></form></div></div><div class="card shadow-sm"><div class="card-body"><table class="table table-hover"><thead><tr><th>Department</th><th>Description</th><th>Status</th><th>Action</th></tr></thead><tbody>{% for dept in departments %}<tr><td>{{ dept.department_name }}</td><td>{{ dept.description or "" }}</td><td>{{ "Active" if dept.is_active else "Disabled" }}</td><td><a class="btn btn-sm btn-outline-dark" href="{{ url_for('admin.toggle_department', department_id=dept.id) }}">Toggle</a></td></tr>{% else %}<tr><td colspan="4" class="text-muted">No departments found.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
