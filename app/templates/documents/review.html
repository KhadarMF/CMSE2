{% extends "base.html" %}
{% block content %}
<div class="mt-4 mb-3"><h2 class="fw-bold">Review Document</h2><p class="text-muted">{{ document.document_title }} — {{ document.project.project_name }}</p></div>
<div class="card shadow-sm"><div class="card-body"><form method="POST">
<div class="mb-3"><label class="form-label">Approval Decision</label><select class="form-select" name="approval_status" required>
<option value="Under Review">Under Review</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option><option value="Need Correction">Need Correction</option>
</select></div>
<div class="mb-3"><label class="form-label">Manager Comments</label><textarea class="form-control" name="manager_comments" rows="5">{{ document.manager_comments or "" }}</textarea></div>
<button class="btn btn-primary">Save Review</button><a class="btn btn-light" href="{{ url_for('documents.detail', document_id=document.id) }}">Cancel</a>
</form></div></div>
{% endblock %}
