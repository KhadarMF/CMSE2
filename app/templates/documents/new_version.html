{% extends "base.html" %}{% block content %}
<div class="mt-4 mb-3"><h2 class="fw-bold">Upload New Version</h2><p class="text-muted">{{ document.document_title }} — {{ document.project.project_name }}</p></div>
<div class="card shadow-sm"><div class="card-body"><form method="POST" enctype="multipart/form-data"><div class="mb-3"><label class="form-label">New File</label><input type="file" class="form-control" name="file" required></div><div class="mb-3"><label class="form-label">Version Remarks</label><textarea class="form-control" name="remarks" rows="3"></textarea></div><button class="btn btn-primary">Upload Version</button><a class="btn btn-light" href="{{ url_for('documents.detail', document_id=document.id) }}">Cancel</a></form></div></div>
{% endblock %}
