{% extends "base.html" %}
{% block content %}
<div class="login-wrapper">
    <div class="card login-card shadow-sm">
        <div class="card-body p-4">
            <h3 class="fw-bold mb-1">{{ company_profile.company_name if company_profile else "Solar Project Document System" }}</h3>
            <p class="text-muted mb-4">{{ company_profile.tagline if company_profile else "Project Document & Approval Management System" }}</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
