{% extends 'base.html' %}
{% block content %}
<h2 class='fw-bold'>Create Notification</h2>
<div class="alert alert-info"><strong>Note:</strong> In-app notification is always created. Email can be sent now if SMTP is configured. SMS is queued only because no SMS API is connected yet.</div>
<form method='post' class='card'><div class='card-body'><div class='row g-3'>
<div class='col-md-6'><label class='form-label'>Title</label><input class='form-control' name='title' required></div>
<div class='col-md-3'><label class='form-label'>Priority</label><select class='form-select' name='priority'>{% for p in priorities %}<option value='{{ p }}'>{{ p }}</option>{% endfor %}</select></div>
<div class='col-md-3'><label class='form-label'>Target User</label><select class='form-select' name='target_user_id'><option value=''>All Users</option>{% for u in users %}<option value='{{ u.id }}'>{{ u.full_name }} - {{ u.role }}</option>{% endfor %}</select></div>
<div class='col-md-4'><label class='form-label'>Category</label><input class='form-control' name='category' placeholder="Task / Ticket / CRM / System"></div>
<div class='col-md-4'><label class='form-label'>Related Module</label><input class='form-control' name='related_module'></div>
<div class='col-md-4'><label class='form-label'>Related Ref</label><input class='form-control' name='related_ref'></div>
<div class='col-md-12'><label class='form-label'>Message</label><textarea class='form-control' rows="4" name='message'></textarea></div>
<div class='col-md-4'><div class="form-check"><input class="form-check-input" type="checkbox" name="send_email_now" id="send_email_now"><label class="form-check-label" for="send_email_now">Send Email Now</label></div></div>
<div class='col-md-4'><div class="form-check"><input class="form-check-input" type="checkbox" name="queue_sms" id="queue_sms"><label class="form-check-label" for="queue_sms">Add SMS to Queue (No API)</label></div></div>
</div><button class='btn btn-primary mt-3'>Save Notification</button></div></form>
{% endblock %}
