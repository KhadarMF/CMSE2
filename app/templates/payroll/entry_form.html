{% extends "base.html" %}{% block content %}<div class="mt-4 mb-3"><h2 class="fw-bold">Add Employee Project Payroll</h2><p class="text-muted mb-0">Manager enters employee salary/wage for a project and month. Finance can later record payment.</p></div><form method="post" class="card shadow-sm"><div class="card-body"><div class="row g-3"><div class="col-md-4"><label class="form-label">Payroll Period *</label><select class="form-select" name="period_id" required><option value="">Select</option>{% for p in periods %}<option value="{{ p.id }}">{{ p.period_name }} — {{ p.year }}-{{ "%02d"|format(p.month) }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Employee *</label><select class="form-select" name="employee_id" required><option value="">Select</option>{% for e in employees %}<option value="{{ e.id }}">{{ e.full_name }} — {{ e.job_title or "" }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Project *</label><select class="form-select" name="project_id" required><option value="">Select</option>{% for p in projects %}<option value="{{ p.id }}">{{ p.project_name }} — {{ p.customer_name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Role on Project</label><input class="form-control" name="role_on_project" placeholder="Site Supervisor / Installer"></div><div class="col-md-4"><label class="form-label">Work Days</label><input class="form-control" type="number" step="0.5" name="work_days" value="0"></div><div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status">{% for s in statuses %}<option value="{{ s }}" {% if s=="Submitted" %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Salary / Wage Amount</label><input class="form-control" type="number" step="0.01" name="salary_amount" value="0"></div><div class="col-md-3"><label class="form-label">Allowance</label><input class="form-control" type="number" step="0.01" name="allowance_amount" value="0"></div><div class="col-md-3"><label class="form-label">Deduction</label><input class="form-control" type="number" step="0.01" name="deduction_amount" value="0"></div><div class="col-md-3"><label class="form-label">Previous Balance</label><input class="form-control" type="number" step="0.01" name="previous_balance" value="0"></div><div class="col-md-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="auto_previous_balance"><label class="form-check-label">Auto calculate previous balance from unpaid old payroll entries for this employee</label></div></div><div class="col-md-12"><label class="form-label">Work Description</label><input class="form-control" name="work_description"></div><div class="col-md-12"><label class="form-label">Manager Notes</label><textarea class="form-control" name="manager_notes" rows="3"></textarea></div></div><div class="mt-3"><button class="btn btn-dark">Save Payroll Entry</button> <a class="btn btn-outline-secondary" href="{{ url_for('payroll.entries') }}">Cancel</a></div></div></form>{% endblock %}
