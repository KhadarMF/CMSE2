{% extends "base.html" %}{% block content %}<div class="mt-4 mb-3"><h2 class="fw-bold">{{ "Edit Payroll Period" if period else "Create Payroll Period" }}</h2></div><form method="post" class="card shadow-sm"><div class="card-body"><div class="row g-3"><div class="col-md-4"><label class="form-label">Period Name</label><input class="form-control" name="period_name" value="{{ period.period_name if period else '' }}" placeholder="May 2026 Payroll"></div><div class="col-md-2"><label class="form-label">Year</label><input class="form-control" type="number" name="year" value="{{ period.year if period else '' }}" required></div><div class="col-md-2"><label class="form-label">Month</label><input class="form-control" type="number" min="1" max="12" name="month" value="{{ period.month if period else '' }}" required></div><div class="col-md-2"><label class="form-label">Start Date</label><input class="form-control" type="date" name="start_date" value="{{ period.start_date if period else '' }}"></div><div class="col-md-2"><label class="form-label">End Date</label><input class="form-control" type="date" name="end_date" value="{{ period.end_date if period else '' }}"></div><div class="col-md-3"><label class="form-label">Status</label><select class="form-select" name="status">{% for s in statuses %}<option value="{{ s }}" {% if period and period.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div><div class="col-md-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="3">{{ period.notes if period else '' }}</textarea></div></div><div class="mt-3"><button class="btn btn-dark">Save</button> <a class="btn btn-outline-secondary" href="{{ url_for('payroll.dashboard') }}">Cancel</a></div></div></form>{% endblock %}
