{% extends "base.html" %}
{% block content %}
<div class="mt-4 mb-3"><h2 class="fw-bold">Create Project</h2><p class="text-muted mb-0">Customer, project type and assigned team are selected from master tables.</p></div>
<form method="post" class="card shadow-sm brand-card"><div class="card-body"><div class="row g-3">
<div class="col-md-6"><label class="form-label">Project Name *</label><input class="form-control" name="project_name" required></div>
<div class="col-md-6"><label class="form-label">Customer *</label><select class="form-select" name="customer_name" required><option value="">Select Customer</option>{% for c in customers %}<option value="{{ c.customer_name }}">{{ c.customer_name }}</option>{% endfor %}</select><small class="text-muted">Add new customers from Master Data → Customers.</small></div>
<div class="col-md-4"><label class="form-label">Location</label><input class="form-control" name="location"></div>
<div class="col-md-4"><label class="form-label">Project Type</label><select class="form-select" name="project_type"><option value="">Select Project Type</option>{% for t in project_types %}<option value="{{ t.type_name }}">{{ t.type_name }}</option>{% endfor %}</select></div>
<div class="col-md-4"><label class="form-label">Capacity</label><input class="form-control" name="capacity" placeholder="15kW / 30kW / 100kWh"></div>
<div class="col-md-4"><label class="form-label">Start Date</label><input type="date" class="form-control" name="start_date"></div>
<div class="col-md-4"><label class="form-label">Expected Completion</label><input type="date" class="form-control" name="expected_completion_date"></div>
<div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status">{% for s in statuses %}<option value="{{ s }}">{{ s }}</option>{% endfor %}</select></div>
<div class="col-md-6"><label class="form-label">Assigned Team</label><select class="form-select" name="assigned_team"><option value="">Select Team</option>{% for team in teams %}<option value="{{ team.team_name }}">{{ team.team_name }}{% if team.leader %} — Leader: {{ team.leader.full_name }}{% endif %}</option>{% endfor %}</select></div>
<div class="col-md-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="4"></textarea></div>
</div><div class="mt-3"><button class="btn btn-dark">Save Project</button> <a class="btn btn-outline-secondary" href="{{ url_for('projects.list_projects') }}">Cancel</a></div></div></form>
{% endblock %}
