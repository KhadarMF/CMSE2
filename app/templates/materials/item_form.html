{% extends "base.html" %}{% block content %}<div class="d-flex justify-content-end mt-2"><a class="btn btn-outline-dark btn-sm" href="{{ url_for('materials.dashboard') }}">Materials Home</a><a class="btn btn-outline-secondary btn-sm ms-1" href="{{ url_for('dashboard.dashboard') }}">Back Home</a></div><div class="mt-2 mb-3"><h2 class="fw-bold">Add Material Item</h2></div><form method="post" class="card shadow-sm"><div class="card-body"><div class="row g-3"><div class="col-md-3"><label class="form-label">Item Code</label><input class="form-control" name="item_code"></div><div class="col-md-5"><label class="form-label">Item Name *</label><input class="form-control" name="item_name" required></div><div class="col-md-2"><label class="form-label">Unit</label><input class="form-control" name="unit"></div><div class="col-md-2"><label class="form-label">Unit Cost</label><input class="form-control" type="number" step="0.01" name="unit_cost" value="0"></div><div class="col-md-4"><label class="form-label">Category</label><input class="form-control" name="category"></div><div class="col-md-8"><label class="form-label">Description</label><input class="form-control" name="description"></div><div class="col-md-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" checked><label class="form-check-label">Active</label></div></div></div><div class="mt-3"><button class="btn btn-dark">Save</button></div></div></form>{% endblock %}
